name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). The tag must already exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: unix
          - target: x86_64-apple-darwin
            runner: macos-13
            os: unix
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: unix
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Stage binary (Unix)
        if: matrix.os == 'unix'
        shell: bash
        run: |
          set -euo pipefail
          bin="the-sieve-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/the-sieve" "$bin"
          shasum -a 256 "$bin" > "$bin.sha256"
          {
            echo "BIN=$bin"
            echo "BIN_SHA=$bin.sha256"
          } >> "$GITHUB_ENV"

      - name: Stage binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $bin = "the-sieve-${{ matrix.target }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/the-sieve.exe" $bin
          (Get-FileHash $bin -Algorithm SHA256).Hash.ToLower() + "  $bin" | Out-File -Encoding ascii "$bin.sha256"
          "BIN=$bin" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "BIN_SHA=$bin.sha256" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            ${{ env.BIN }}
            ${{ env.BIN_SHA }}
          fail_on_unmatched_files: true
          generate_release_notes: true
